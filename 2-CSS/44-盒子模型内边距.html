<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box1 {
        width: 200px;
        height: 100px;
        padding: 10px 20px 30px 50px;
        background-color: pink;
        border-radius: 70px;
    }
    .title {
        border: 1px solid #ccc;
        border-top: 2px solid #DA8C35;
        background-color: #FFFFFF;
        padding: 0px 0px 0px 10px;
        width: 100px;
        height: 50px;
        line-height: 50px;
        
    }
    /* 外边距和内边距基本一致 */
    /* 1.行内元素左右外边距生效，上下外边距无效 */
    /* 2.行内元素设置宽度和高度也无效 */
</style>
<body>
    <div class="box1">随即一段话</div>
    <div class="title">车研所</div>
</body>
</html>
