    .box {
        width: 500px;
        height: 300px;
        border: 1px solid black;
        margin: 0 auto;
        text-align: center;
        border-collapse: collapse;
     }
     .box tr:nth-child(odd) {
         background-color: #f9f9f9;
         color: #333;
        }
        .box tr:first-child {
           background-color: #8fbcf1 !important;
           color: #fff;
        }
    .box tr:hover {
        background-color: aliceblue;
    }
    </style>
<body>
    <table border="0" class="box">
        <tr>
            <th>姓名</th>
