<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .radius {
        margin: 0 auto;
        width: 200px;
        height: 100px;
        border-radius: 10px;
        border: 2px solid;
        color: #777;
        line-height: 100px;
        text-align: center;
        
    }
    .circle {
        margin:2px auto;
        width: 200px;
        height: 200px;
        /* 50% */
        border-radius: 50%;
        border: 2px solid;
        color: pink;
        background-color: palegoldenrod;
    }
    .jiaoNang {
        /* 高的一半 */
        margin: 2px auto;
        width: 200px;
        height: 100px;
        border-radius: 50px;
        border: 2px solid;
        background-color: palegoldenrod;
    }
    .pic {
        margin: 2px auto;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        
    }
    .radius2 {
        margin: 0 auto;
        width: 200px;
        height: 100px;
        border-radius: 10px 20px;
        border: 2px solid;
        background-color: paleturquoise;
        line-height: 100px;
        text-align: center;
        
    }
    .radius3 {
        margin: 0 auto;
        width: 200px;
        height: 100px;
        border-radius: 10px 20px 30px;
        border: 2px solid;
        background-color: pink;
        line-height: 100px;
        text-align: center;
        
    }
    .radius3 {
        margin: 0 auto;
        width: 200px;
        height: 100px;
        border-radius: 10px 20px 30px 40px;
        border: 2px solid;
        background-color: pink;
        line-height: 100px;
        text-align: center;
        
    }
</style>
<body>
    <div class="radius">11111111</div>
    <div class="circle"></div>
    <div class="jiaoNang"></div>
    <img src="./media/gou.png" alt="" class="pic">
    <div class="radius2">两个值</div>
    <div class="radius3">三个值</div>
    <div class="radius4">四个值</div>
</body>
</html>
