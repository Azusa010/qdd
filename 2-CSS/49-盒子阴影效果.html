<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    /* box-shadow:X轴偏移量 Y轴偏移量 模糊半径 扩散半径 颜色; */
    /* 多个属性用空格隔开 */
    /* 默认是外阴影，如果改为内阴影要写inset */
    .box {
        width: 200px;
        height: 200px;
        background-color: #fec0ca;
        margin: 100px auto;
        /* 添加过渡效果 */
        /* 过度属性值都要变化可以写all */
        transition: all 0.3s;
    }
    .box:hover {
        width: 210px;
        height: 210px;

        box-shadow: 0px 10px 30px 0 rgba(0, 0, 0, 0.5);
    }
</style>
<body>
    <div class="box"></div>
    
</body>
</html>
