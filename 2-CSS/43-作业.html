<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box {
        background-color: #f3f5f7;
        width: 200px auto;
        height: 100px auto;
        padding: 10px;
        display: flex;
    }
    .menu {
        width: 100px;
        height: 50px;
        line-height: 50px;
        text-align: center;
        background-color: white;
        font-size: 10px;
        border-radius: 10px;
        border:1px solid #ccc;
        margin: 20px auto;
    }
    .radius {
        margin: 0 auto;
        width: 200px;
        height: 100px;
        border-radius: 10px 50px 50px 0px;
        border: 2px solid;
        color: #777;
        line-height: 100px;
        text-align: center;
        
    }
</style>
<body>
    <div class="box">
        <div class="menu">采购清单</div>
        <div class="menu">我的购物车</div>
        <div class="radius">用清单采购更高效</div>
    </div>    
</body>
</html>
