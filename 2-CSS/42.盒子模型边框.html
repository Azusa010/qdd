<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    div[class*='box'] {
        width: 200px;
        height: 100px;
        line-height: 100px;
        text-align: center;
        margin: 20px auto;
    }
    .box1 {
        border: 2px solid black;
        
    }
    .box2 {
        border: 2px dashed ;
        line-height: 100px;
    }
    .box3 {
        border:2px dotted ;
    }
    .box4 {
        border: 1px solid #777;
        border-top: 2px solid red;
    }
</style>
<body>
    <div class="box1">实现边框</div>
    <div class="box2">虚线边框</div>
    <div class="box3">点线边框</div>
    <div class="box4">不同边框1</div>
    <div class="box5">不同边框2</div>
</body>
</html>
