<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        padding: 0;
        margin: 0;
    }
    .pink {
        color: pink;
    }
    .pink16 {
        color: #00f;
    }

    .colorRgb {
        color: rgb(1, 2, 255)
    }
    .colorRgba {
        color: rgba(100, 0, 255, 0.1);
        background-color: black;
    }
    .noBold {
        font-weight: normal;
    }
    .bold {
        font-weight: 700;
    }
    .none {
        text-decoration: none;
    }
    .underlinr {
        text-decoration: overline;
    }
    .underlinr {
        text-decoration: underline;
    }
    .overthrough {
        text-decoration: ovr;
    }
</style>
<body>
    <div class="pink">Niaho</div>
    <div class="pink16">1</div>
    <div class="colorRgb">2</div>
    <div class="colorRgba">3</div>
    <div class="bold">1111111111111111111111111111111</div>
    <div class="noBold">111111111111</div>

</body>
</html>
