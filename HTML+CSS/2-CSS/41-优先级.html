<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    table {
        width: auto;
        border-collapse: collapse;
    }
    th, td {
        border: 1px solid #000;
        padding: 8px;
        text-align: center;
    }
</style>
<body>
    <p>选择器优先级</p>
    <table>
        <tr>
            <th>选择器类型</th>
            <th>示例</th>
            <th>权重值</th>
        </tr>
        <tr>
            <td>!important</td>
            <td>color:red !important</td>
            <td>无限大</td>
        </tr>
        <tr>
            <td>内联样式</td>
            <td>&lt;div style="color: red;"&gt;&lt;/div&gt;</td>
            <td>(1,0,0,0)</td>
        </tr>
        <tr>
            <td>ID选择器</td>
            <td>#myId</td>
            <td>(0,1,0,0)</td>
        </tr>
        <tr>
            <td>类/属性/伪类选择器</td>
            <td>.class,[type="text"]</td>
            <td>(0,0,1,0)</td>
        </tr>
        <tr>
            <td>类型(标签）/伪元素</td>
            <td>div::before</td>
            <td>(0,0,0,1)</td>
        </tr>
        <tr>
            <td>通配符</td>
            <td>*</td>
            <td>(0,0,0,0)</td>
    </table>
</body>
</html>
