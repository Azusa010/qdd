        min-width: calc(16.66666666% - 16px);
        max-width: calc(16.66666666% - 16px);
        margin: 0 8px 16px;
    }
    
     .block {
        background-color: black;
        width: 80%;
        height: 120px;
        margin: 0 auto;
     }
</style>
