<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box {
        margin:0 auto;
        border: 1px solid black;   
    }
    .box ul li {
        width: 190px;
        height: 200px;
        margin-right: 15px;     
        float: left;
        
    }
    .box ul li:nth-child(odd) {
        background-color: pink;
    }
    .box ul li:nth-child(even) {
        background-color: blue;
    }
    ul,li {
        list-style: none;
    }
    .box ul li:last-child {
        margin-right: 0;
    }
</style>

<body>
    <div class="box">
        <ul>
            <li>第一个盒子</li>
            <li>第二个盒子</li>
            <li>第三个盒子</li>
        </ul>
    </div>
    
</body>
</html>
