<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }
    a {
        text-decoration: none;
    }
    ol,li {
        list-style: none;
    }
    
    .subbar {
        width: 234px;
        height: 460px;
        background-color: #9b9b9b;
        margin: 100px auto;
        padding: 20px 0;
        font-size: 14px;
    }
    .subbar ul li a {
        /* 行转换为块 */
        display: block;
        color: white;
        line-height: 42px;
        height: 42px;
        padding-left: 20px;
    }
    .subbar ul li a:hover {
        background-color: #ff6700;
    }
    .list {
        width: 400px;
        height: 400px;
        border: 1px solid red;
        margin: 0 auto;
        /* 去除inlinke-block空白缝隙 */
        font-size: 0;
    }
    .list a {
        /* 转换为行内块元素 */
        display: inline-block;
        background-color: #ccc;
        color: #fff;
        border-radius: 5px;
        line-height: 30px;
        font-size: 12px;
    }
</style>
<body>
    <div class="subbar">
        <ul>
            <li><a href="#">手机</a></li>
            <li><a href="#">电视</a></li>
            <li><a href="#">家电</a></li>
            <li><a href="#">笔记本 平板 显示器</a></li>
            <li><a href="#">出行 穿戴</a></li>
            <li><a href="#">健康 儿童</a></li>
        </ul>
    </div>
    <div class="list">
        <a href="#">一个字</a>
        <a href="#">两个字字</a>
        <a href="#">三个字字字</a>
    </div>
</body>
</html>
